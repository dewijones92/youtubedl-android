# L2: keep the bundled yt-dlp current. yt-dlp ships the YouTube extractor logic that breaks often
# (cipher/nsig/clients), so the bundled zipapp (library/src/main/res/raw/ytdlp) needs regular
# bumps. It's a binary, not a Renovate-able version string, so this scheduled job checks upstream,
# swaps the zipapp, and opens a PR. The PR's deterministic gates (build + API-23 symbol gate +
# RuntimeSmokeTest) run automatically; real-network extraction must be validated off-CI (CI's
# datacenter IP is YouTube-bot-blocked) before merging.
name: Update bundled yt-dlp

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  update:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check + swap yt-dlp zipapp
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BUNDLED=library/src/main/res/raw/ytdlp
          current="$(unzip -p "$BUNDLED" yt_dlp/version.py | grep __version__ | cut -d"'" -f2)"
          latest="$(gh api repos/yt-dlp/yt-dlp/releases/latest --jq .tag_name)"
          echo "current=$current latest=$latest"
          if [ "$current" = "$latest" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"; echo "Already up to date ($current)"; exit 0
          fi
          url="$(gh api repos/yt-dlp/yt-dlp/releases/latest --jq '.assets[]|select(.name=="yt-dlp")|.browser_download_url')"
          [ -n "$url" ] || { echo "no 'yt-dlp' zipapp asset in $latest"; exit 1; }
          curl -fsSL -o "$BUNDLED" "$url"
          got="$(unzip -p "$BUNDLED" yt_dlp/version.py | grep __version__ | cut -d"'" -f2)"
          [ "$got" = "$latest" ] || { echo "downloaded version $got != $latest"; exit 1; }
          { echo "changed=true"; echo "current=$current"; echo "latest=$latest"; } >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CUR: ${{ steps.bump.outputs.current }}
          NEW: ${{ steps.bump.outputs.latest }}
        run: |
          set -euo pipefail
          branch="auto/update-ytdlp-${NEW}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add library/src/main/res/raw/ytdlp
          git commit -m "L2: bump bundled yt-dlp ${CUR} -> ${NEW}"
          git push -f origin "$branch"
          gh pr list --head "$branch" --json number --jq '.[0].number' | grep -q . && { echo "PR already open"; exit 0; }
          gh pr create --head "$branch" --base master \
            --title "L2: bump bundled yt-dlp ${CUR} -> ${NEW}" \
            --body "Automated bump of the bundled yt-dlp zipapp (\`library/src/main/res/raw/ytdlp\`) from **${CUR}** to **${NEW}**.

          Deterministic gates (build + API-23 symbol gate + on-device RuntimeSmokeTest) run on this PR. **Real YouTube extraction must be verified off-CI** before merge — CI runs on a datacenter IP that YouTube bot-blocks (see ci.yml / NetworkExtractionTest). Quick local check:
          \`\`\`
          python3 library/src/main/res/raw/ytdlp -F 'https://youtu.be/jNQXAC9IVRw'
          \`\`\`"
