# JitPack build config: build the API-23 fork straight from GitHub so consumers can depend on
# it without a local publish. buildSrc needs JDK 17. Signing is gated off (no GPG on JitPack),
# so publishToMavenLocal runs unsigned.
jdk:
  - openjdk17
install:
  - ./gradlew :common:publishToMavenLocal :library:publishToMavenLocal :ffmpeg:publishToMavenLocal
